{% extends 'app/base.html' %}
{% load static %}

{% block main-content %}

<div class="container my-5">
  <div class="row justify-content-center">

    <!-- LEFT : ADDRESS FORM -->
    <div class="col-md-7">
      <div class="card checkout-card p-4">
        <h4 class="mb-4 fw-bold">📍 Fill Details</h4>

        <form method="post" action="{% url 'order_place' %}">
          {% csrf_token %}

          <!-- NAME -->
          <div class="mb-3">
            <label class="form-label">Full Name</label>
            <input type="text"
                   name="name"
                   class="form-control"
                   placeholder="Enter your name"
                   required>
          </div>

          <!-- MOBILE -->
          <div class="mb-3">
            <label class="form-label">Mobile Number</label>
            <input type="tel"
                   name="mobile"
                   class="form-control"
                   placeholder="10 digit mobile number"
                   required>
          </div>

          <!-- DATE & TIME (NEW) -->
          <div class="row">
            <div class="col-md-6 mb-3">
              <label class="form-label">Select Date</label>
              <input type="date"
                     name="booking_date"
                     class="form-control"
                     required>
            </div>

            <div class="col-md-6 mb-3">
              <label class="form-label">Select Time</label>
              <input type="time"
                     name="booking_time"
                     class="form-control"
                     required>
            </div>
          </div>

          <!-- ADDRESS -->
          <div class="mb-3">
            <label class="form-label">Full Address</label>
            <textarea name="address"
                      rows="3"
                      class="form-control"
                      placeholder="House no, Street, Area, City, Pincode"
                      required></textarea>
          </div>

          <!-- SUBMIT -->
          <button class="btn btn-primary w-100 py-2">
            Booking Now
          </button>
        </form>
      </div>
    </div>

    <!-- RIGHT : ORDER SUMMARY -->
    <div class="col-md-4">
      <div class="card checkout-summary p-4">
        <h5 class="fw-bold mb-3">🧾 Order Summary</h5>

        <div class="d-flex justify-content-between mb-2">
          <span>Total Items</span>
          <span>{{ carts|length }}</span>
        </div>

        <div class="d-flex justify-content-between mb-2">
          <span>Amount</span>
          <span>₹{{ totalamount }}</span>
        </div>

        <hr>

        <div class="d-flex justify-content-between fw-bold fs-5">
          <span>Total Amount</span>
          <span class="text-success">₹{{ totalamount }}</span>
        </div>

        <small class="text-muted mt-2 d-block">
          * Payment will be collected after service confirmation
        </small>
      </div>
    </div>

  </div>
</div>

{% endblock %}
