{% load static %}
<!DOCTYPE html>
<html>
<head>
<title>Blogs</title>
<link rel="stylesheet" href="{% static 'app/css/style.css' %}">
</head>
<body>

<div class="wrapper">

    <!-- LEFT -->
    <div class="latest">
        <h2>Latest Posts</h2>

        {% for post in latest %}
        <div class="latest-card">
            <img src="{% static 'app/images/banner/2.jpg' %}">
            <div class="latest-content">
                <h3>{{ post.title }}</h3>
                <p>{{ post.desc }}</p>
                <small>{{ post.date }}</small><br>
                <a href="#">Read More →</a>
            </div>
        </div>
        {% endfor %}
    </div>

    <!-- RIGHT -->
    <div class="right">
    {% for section in sections %}
        <div class="section">
            <div class="section-head">
                <h3>{{ section.name }}</h3>
                <button>MORE</button>
            </div>

            {% for p in section.posts %}
            <div class="mini-post">
                <span>•</span>
                <div>
                    <p>{{ p.title }}</p>
                    <a href="#">read more</a>
                </div>
            </div>
            {% endfor %}
        </div>
    {% endfor %}
    </div>

</div>
</body>
</html>

<style>
    body{
    margin:0;
    font-family: "Segoe UI", Arial, sans-serif;
    background:#f2f4f7;
    color:#333;
}

.wrapper{
    width:90%;
    max-width:1200px;
    margin:40px auto;
    display:grid;
    grid-template-columns: 48% 52%;
    gap:35px;
}

/* ================= LEFT ================= */

.latest h2{
    font-size:22px;
    margin-bottom:20px;
    border-left:5px solid #c62828;
    padding-left:10px;
}

.latest-card{
    display:flex;
    gap:15px;
    margin-bottom:25px;
    background:#fff;
    border-radius:10px;
    overflow:hidden;
    box-shadow:0 8px 20px rgba(0,0,0,0.08);
    transition:0.3s;
}

.latest-card:hover{
    transform:translateY(-4px);
}

.latest-card img{
    width:190px;
    height:140px;
    object-fit:cover;
}

.latest-content{
    padding:12px 15px;
}

.latest-content h3{
    margin:0 0 8px;
    font-size:16px;
    line-height:1.3;
}

.latest-content p{
    font-size:14px;
    color:#666;
    margin-bottom:8px;
}

.latest-content small{
    color:#999;
}

.latest-content a{
    text-decoration:none;
    color:#c62828;
    font-weight:600;
    font-size:14px;
}

/* ================= RIGHT ================= */

.section{
    background:#fff;
    padding:15px;
    border-radius:10px;
    margin-bottom:30px;
    box-shadow:0 8px 20px rgba(0,0,0,0.06);
}

.section-head{
    display:flex;
    justify-content:space-between;
    align-items:center;
    border-bottom:1px solid #eee;
    padding-bottom:10px;
    margin-bottom:10px;
}

.section-head h3{
    margin:0;
    font-size:18px;
}

.section-head button{
    background:#c62828;
    color:#fff;
    border:none;
    padding:6px 16px;
    border-radius:20px;
    font-size:13px;
    cursor:pointer;
}

.section-head button:hover{
    opacity:0.9;
}

.mini-post{
    display:flex;
    gap:10px;
    padding:10px 0;
    border-bottom:1px dashed #eee;
}

.mini-post:last-child{
    border-bottom:none;
}

.mini-post span{
    color:#c62828;
    font-size:18px;
    margin-top:3px;
}

.mini-post p{
    margin:0;
    font-size:14px;
}

.mini-post a{
    font-size:13px;
    color:#1565c0;
    text-decoration:none;
}

/* ================= RESPONSIVE ================= */

@media(max-width:900px){
    .wrapper{
        grid-template-columns:1fr;
    }

    .latest-card{
        flex-direction:column;
    }

    .latest-card img{
        width:100%;
        height:200px;
    }
}

</style>
